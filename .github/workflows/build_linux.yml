name: Bazel Build (Linux)

permissions:
  contents: read
  actions: write

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

jobs:
  linux-build:
    name: Build with bl-x86_64-linux
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bazel Cache
        uses: eclipse-score/cicd-actions/setup-bazel-cache@659dcbed63f6b7fbde88c7850125ea0a0a92f939
        with:
          unique-cache-name: ${{ github.workflow }}-${{ github.job }}

      - name: Bazel Build
        run: |
          TARGETS=(//examples/... //tests/...)

          # consider //score/... targets only in case such directory actually contains any Bazel packages.
          if find score -type f \( -name BUILD -o -name BUILD.bazel \) | grep -q .; then
            TARGETS+=(//score/...)
          fi

          bazel build --config=bl-x86_64-linux -- "${TARGETS[@]}"

      - name: Bazel Test
        run: |
          TARGETS=(//examples/... //tests/...)

          # consider //score/... targets only in case such directory actually contains any Bazel packages.
          if find score -type f \( -name BUILD -o -name BUILD.bazel \) | grep -q .; then
            TARGETS+=(//score/...)
          fi

          bazel test --config=bl-x86_64-linux -- "${TARGETS[@]}"
